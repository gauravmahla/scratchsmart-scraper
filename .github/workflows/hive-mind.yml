name: Neural Mesh Hive Mind

on:
  schedule:
    - cron: '30 17 * * *'
    - cron: '30 3 * * *'
  workflow_dispatch: 

jobs:
  execute-mesh:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js Ecosystem
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Initialize & Install (Bulletproof)
      run: |
        npm init -y
        npm install @supabase/supabase-js ws

    - name: Run Hive Engine (Forcing IPv4)
      run: node --dns-result-order=ipv4first hive_engine.js
      
