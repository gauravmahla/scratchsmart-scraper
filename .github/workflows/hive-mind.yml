name: Neural Mesh Hive Mind

on:
  schedule:
    - cron: '30 17 * * *' # ~1:30 PM ET (Midday Run)
    - cron: '30 3 * * *'  # ~11:30 PM ET (Evening Run - UTC next day)
  workflow_dispatch: 

jobs:
  execute-mesh:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js Ecosystem
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Database Libraries
      run: npm install @supabase/supabase-js

    - name: Run Hive Engine
      run: node hive_engine.js
      
