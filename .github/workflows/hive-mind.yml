name: Neural Mesh Hive Mind

on:
  # Cron schedules run autonomously after the manual UI entry window
  schedule:
    - cron: '30 17 * * *' # ~1:30 PM ET (Midday Run)
    - cron: '30 3 * * *'  # ~11:30 PM ET (Evening Run - UTC next day)
  
  # Crucial: Allows us to manually click a button to run the Cold Start right now
  workflow_dispatch: 

jobs:
  execute-mesh:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js Ecosystem
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Math & DB Libraries
      run: npm install

    - name: Run Hive Engine
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: node hive_engine.js

