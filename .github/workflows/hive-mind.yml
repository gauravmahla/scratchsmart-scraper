name: Neural Mesh Hive Mind

on:
  workflow_dispatch: 

jobs:
  execute-mesh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js Ecosystem
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Initialize & Install Dependencies
      run: |
        npm init -y
        npm install @supabase/supabase-js ws

    - name: Execute Tri-Engine Compiler
      run: node --dns-result-order=ipv4first hive_engine.js
      
