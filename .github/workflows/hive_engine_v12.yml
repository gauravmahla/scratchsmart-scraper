name: Phase 12 Crystallized Intelligence Engine

on:
  workflow_dispatch: # Manual trigger for precise human-in-the-loop synchronization

jobs:
  kdd_execution:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install KDD Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn psycopg2-binary sqlalchemy pytz

      - name: Execute Phase 12 Hive Engine
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          python hive_engine_phase12.py
          
