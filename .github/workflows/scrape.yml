name: 🧠 Autonomous Swarm Orchestrator
on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

jobs:
  swarm-execution:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Stochastic Jitter Delay
        run: sleep $((RANDOM % 120))

      - name: Execute Multi-Agent Swarm
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scraper.js
