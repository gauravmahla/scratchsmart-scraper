name: Phase 13 Grandmaster Intelligence Engine

on:
  workflow_dispatch: # Manual trigger for precise temporal synchronization

jobs:
  kdd_execution:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Deep-Time Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn psycopg2-binary sqlalchemy tzdata

      - name: Execute Phase 13 Hive Engine
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -e
          python hive_engine_phase13.py
          
