name: Phase 14 Apex Intelligence Engine

on:
  workflow_dispatch:

jobs:
  kdd_execution:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Apex Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn psycopg2-binary sqlalchemy tzdata

      - name: Execute Phase 14 Hive Engine
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -e
          python hive_engine_phase14.py
          
